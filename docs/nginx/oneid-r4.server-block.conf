# R4 replacement block untuk server_name oneid.local sahaja.
# Jangan pasang sebagai server block tambahan kerana oneid.local sudah wujud
# dalam /etc/nginx/sites-available/local-projects.
server {
    listen 443 ssl http2;
    server_name oneid.local;

    root /var/www/app/oneid-uat/public;
    index index.php index.html;
    client_max_body_size 6m;

    ssl_certificate     /home/iqs/ssl/local-dev.pem;
    ssl_certificate_key /home/iqs/ssl/local-dev-key.pem;

    access_log /var/log/nginx/oneid-r4.access.log;
    error_log  /var/log/nginx/oneid-r4.error.log;

    # Fail/folder project dalaman tidak boleh jatuh ke front controller.
    location ~* ^/(?:README(?:\.md)?|package(?:-lock)?\.json|bower\.json|Gruntfile\.js|sso_db\.sql|docs(?:/.*)?|cron(?:/.*)?|bootstrap(?:/.*)?|storage(?:/.*)?|tools(?:/.*)?|diag(?:/.*)?|test\.php|atest\.php)$ {
        return 404;
    }

    location / {
        if (-f $request_filename.php) {
            rewrite ^(.+?)/?$ $1.php last;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* ^/public_img/.*\.(?:php[0-9]?|phtml|phar|cgi|pl|py|sh)$ {
        return 404;
    }

    location ~* ^/(?:assetsM|dist|img|vendors|public_docs|videos)/.*\.(?:php[0-9]?|phtml|phar|cgi|pl|py|sh)$ {
        return 404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param ONEID_APP_URL https://oneid.local;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\. {
        deny all;
    }
}
