# Emergency baseline restoration untuk oneid.local sebelum R4.
# Tambah block ini ke /etc/nginx/sites-available/local-projects.
server {
    listen 443 ssl http2;
    server_name oneid.local;

    root /var/www/app/oneid-uat;
    index index.php index.html;

    ssl_certificate     /home/iqs/ssl/local-dev.pem;
    ssl_certificate_key /home/iqs/ssl/local-dev-key.pem;

    location / {
        if (-f $request_filename.php) {
            rewrite ^(.+?)/?$ $1.php last;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\. {
        deny all;
    }
}
