# Include these locations inside the `server` block for oneid.local.
# Place them BEFORE the generic `location ~ \.php$` block.

# Do not serve database dumps, logs or host-operation scripts.
location ~* \.(sql|log|bat|ps1)$ {
    deny all;
}

# Do not serve OS metadata files.
location ~* /(?:\.DS_Store|Thumbs\.db)$ {
    deny all;
}

# Uploaded assets must never be passed to PHP-FPM or another interpreter.
location ~* ^/public_img/.*\.(php[0-9]?|phtml|phar|cgi|pl|py|sh|exe|dll|bat|cmd|ps1)$ {
    deny all;
}
