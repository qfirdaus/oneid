# R3 parallel UAT vhost. Template sahaja; belum dipasang ke /etc/nginx.
# Prasyarat: sijil di bawah mesti mempunyai SAN DNS:oneid-next.local.
server {
    listen 443 ssl http2;
    server_name oneid-next.local;

    root /var/www/app/oneid-uat/public;
    index index.php index.html;

    ssl_certificate     /etc/nginx/ssl/oneid-next.local.crt;
    ssl_certificate_key /etc/nginx/ssl/oneid-next.local.key;

    access_log /var/log/nginx/oneid-next.access.log;
    error_log  /var/log/nginx/oneid-next.error.log;

    # Fail/folder project dalaman tidak boleh jatuh ke front controller.
    location ~* ^/(?:README(?:\.md)?|package(?:-lock)?\.json|bower\.json|Gruntfile\.js|sso_db\.sql|docs(?:/.*)?|cron(?:/.*)?|bootstrap(?:/.*)?|storage(?:/.*)?|tools(?:/.*)?|diag(?:/.*)?|test\.php|atest\.php)$ {
        return 404;
    }

    location / {
        if (-f $request_filename.php) {
            rewrite ^(.+?)/?$ $1.php last;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* ^/public_img/.*\.(?:php[0-9]?|phtml|phar|cgi|pl|py|sh)$ {
        return 404;
    }

    location ~* ^/(?:assetsM|dist|img|vendors|public_docs|videos)/.*\.(?:php[0-9]?|phtml|phar|cgi|pl|py|sh)$ {
        return 404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param ONEID_APP_URL https://oneid-next.local;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\. {
        deny all;
    }
}
